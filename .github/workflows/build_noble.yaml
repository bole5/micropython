name: Build ESP32_GENERIC NOBLE

on:
  push:
    paths:
      - 'ports/esp32/boards/ESP32_GENERIC/**'
  workflow_dispatch:  # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          command: |
            make -C mpy-cross
            make -C ports/esp32 submodules
            make -C ports/esp32 BOARD=ESP32_GENERIC BOARD_VARIANT=NOBLE

      - uses: actions/upload-artifact@v4
        with:
          name: ESP32_GENERIC-NOBLE-firmware
          path: ports/esp32/build-ESP32_GENERIC-NOBLE/firmware.bin
